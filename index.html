<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Remover - 免费在线去背景</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: white;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.9);
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    .upload-area {
      background: white;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .drop-zone {
      border: 3px dashed #ddd;
      border-radius: 15px;
      padding: 50px 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .drop-zone:hover {
      border-color: #667eea;
      background: #f8f9ff;
    }

    .drop-zone.dragover {
      border-color: #667eea;
      background: #f0f3ff;
    }

    .drop-zone-icon {
      font-size: 4rem;
      margin-bottom: 15px;
    }

    .drop-zone-text {
      font-size: 1.2rem;
      color: #333;
      margin-bottom: 10px;
    }

    .drop-zone-hint {
      color: #888;
      font-size: 0.9rem;
    }

    #fileInput {
      display: none;
    }

    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .result-area {
      display: none;
      margin-top: 30px;
    }

    .result-area.show {
      display: block;
    }

    .preview-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .preview-box {
      flex: 1;
      min-width: 300px;
      max-width: 400px;
    }

    .preview-box h3 {
      text-align: center;
      margin-bottom: 15px;
      color: #333;
    }

    .preview-box img {
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .download-btn {
      display: block;
      width: 100%;
      max-width: 400px;
      margin: 30px auto 0;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }

    .download-btn:hover {
      box-shadow: 0 10px 30px rgba(56, 239, 125, 0.4);
    }

    .loading {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background: #fee;
      color: #c00;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .usage-hint {
      text-align: center;
      margin-top: 20px;
      color: #888;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ Background Remover</h1>
    <p class="subtitle">免费在线去除图片背景</p>

    <div class="upload-area">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-icon">📁</div>
        <div class="drop-zone-text">拖拽图片到这里，或点击上传</div>
        <div class="drop-zone-hint">支持 PNG、JPG、WEBP，最大 10MB</div>
      </div>
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">
      
      <button class="btn" id="uploadBtn" style="display:none;">上传并处理</button>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>正在处理图片，请稍候...</p>
      </div>

      <div class="error" id="error"></div>

      <div class="result-area" id="resultArea">
        <div class="preview-container">
          <div class="preview-box">
            <h3>原图</h3>
            <img id="originalImg" src="" alt="Original">
          </div>
          <div class="preview-box">
            <h3>结果</h3>
            <img id="resultImg" src="" alt="Result">
          </div>
        </div>
        <button class="btn download-btn" id="downloadBtn">下载处理后的图片</button>
      </div>

      <p class="usage-hint">免费版每天 3 次使用次数</p>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const loading = document.getElementById('loading');
    const resultArea = document.getElementById('resultArea');
    const originalImg = document.getElementById('originalImg');
    const resultImg = document.getElementById('resultImg');
    const downloadBtn = document.getElementById('downloadBtn');
    const error = document.getElementById('error');

    let currentFile = null;
    let resultBlob = null;

    // 点击上传
    dropZone.addEventListener('click', () => fileInput.click());

    // 文件选择
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
      }
    });

    // 拖拽上传
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    function handleFile(file) {
      // 验证文件类型
      if (!['image/png', 'image/jpeg', 'image/webp'].includes(file.type)) {
        showError('请上传 PNG、JPG 或 WEBP 格式的图片');
        return;
      }

      // 验证文件大小 (10MB)
      if (file.size > 10 * 1024 * 1024) {
        showError('图片大小不能超过 10MB');
        return;
      }

      currentFile = file;
      originalImg.src = URL.createObjectURL(file);
      uploadBtn.style.display = 'inline-block';
      resultArea.classList.remove('show');
      error.classList.remove('show');
    }

    // 上传并处理
    uploadBtn.addEventListener('click', async () => {
      if (!currentFile) return;

      uploadBtn.disabled = true;
      loading.classList.add('show');
      resultArea.classList.remove('show');
      error.classList.remove('show');

      try {
        const formData = new FormData();
        formData.append('image', currentFile);

        // 调用 Cloudflare Workers API
        const response = await fetch('/removebg', {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.details || err.error || '处理失败');
        }

        resultBlob = await response.blob();
        const resultUrl = URL.createObjectURL(resultBlob);
        resultImg.src = resultUrl;

        resultArea.classList.add('show');
      } catch (err) {
        showError(err.message || '处理失败，请重试');
      } finally {
        uploadBtn.disabled = false;
        loading.classList.remove('show');
      }
    });

    // 下载图片
    downloadBtn.addEventListener('click', () => {
      if (!resultBlob) return;

      const link = document.createElement('a');
      link.href = URL.createObjectURL(resultBlob);
      link.download = 'background-removed.png';
      link.click();
    });

    function showError(message) {
      error.textContent = message;
      error.classList.add('show');
    }
  </script>
</body>
</html>
